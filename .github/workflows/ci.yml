name: CI

on:
  push:
  pull_request:

jobs:
  smoke-and-build:
    name: Smoke and Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 16
          cache: npm

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci
        env:
          npm_config_python: python

      - name: Capture platform diagnostics
        shell: bash
        run: |
          mkdir -p artifacts/platform-diagnostics
          npm run diagnostics:platform > artifacts/platform-diagnostics/${{ matrix.os }}.json

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Build
        run: npm run build

      - name: Upload CI artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ci-${{ matrix.os }}
          if-no-files-found: ignore
          path: |
            artifacts/**
            server/dist/**
            src/build/**
            src/js/ar/dist/**
            src/js/xr/dist/**
